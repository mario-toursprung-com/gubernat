apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

{% if contour_config.mode == "ds" %}
resources:
- contour-daemonset.yaml
{% else %}
resources:
- contour-deployment.yaml

patches:
- path: service-patch.yaml
{% if contour_config.option is defined %}
{% if contour_config.option == "proxy-protocol" %}
- target:
    kind: Deployment
    name:  contour
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: --use-proxy-protocol
{% endif %}
{% endif %}
{% endif %}

{% if repo_mirror is defined %}
images:
- name: ghcr.io/projectcontour/contour:v1.33.5
  newName: {{ repo_mirror }}/ghcr.io/projectcontour/contour
  newTag: v1.33..5
- name: docker.io/envoyproxy/envoy:distroless-v1.35.10
  newName: {{ repo_mirror }}/docker.io/envoyproxy/envoy
  newTag: distroless-v1.35.10
{% endif %}
